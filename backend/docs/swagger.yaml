host: localhost:8080
info:
  contact: {}
  description: お笑いラジオの視聴記録SNS API
  title: Podlog API
  version: "1.0"
paths:
  /admin/podcasts:
    post:
      consumes:
      - application/json
      description: RSS フィードがない番組を手動で登録します。Spotify 独占配信など、通常の検索では追加できない番組に使用します。
      parameters:
      - description: 番組情報
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/usecase.CreatePodcastInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Podcast'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 番組手動登録（管理用）
      tags:
      - admin
  /admin/podcasts/{id}/episodes:
    post:
      consumes:
      - application/json
      description: 指定した番組にエピソードを手動で追加します。RSS フィードがない番組のエピソード登録に使用します。
      parameters:
      - description: ポッドキャストID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: エピソード情報
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/usecase.CreateEpisodeInput'
      produces:
      - application/json
      responses:
        "200":
          description: 既存エピソード返却（iTunes Track ID 重複）
          schema:
            $ref: '#/definitions/model.Episode'
        "201":
          description: 新規作成
          schema:
            $ref: '#/definitions/model.Episode'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: エピソード手動登録（管理用）
      tags:
      - admin
  /episodes/{id}:
    get:
      description: エピソードIDから詳細情報を取得します。ポッドキャスト情報・平均評価・レビュー件数を含みます。認証済みの場合は聴取状態も含みます。
      parameters:
      - description: エピソードID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.EpisodeDetailResult'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: エピソード詳細取得
      tags:
      - episodes
  /episodes/{id}/listen:
    delete:
      description: 認証ユーザーの聴取記録を削除します
      parameters:
      - description: エピソードID (UUID)
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 聴取記録削除
      tags:
      - listening-records
    get:
      description: 認証ユーザーがそのエピソードを聴いたかどうか確認します
      parameters:
      - description: エピソードID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 聴取状態確認
      tags:
      - listening-records
    post:
      description: 認証ユーザーが指定エピソードを「聴いた」として記録します
      parameters:
      - description: エピソードID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.ListeningRecord'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 聴取記録追加
      tags:
      - listening-records
  /episodes/{id}/reviews:
    get:
      description: エピソードに投稿されたレビュー一覧を取得します
      parameters:
      - description: エピソードID (UUID)
        in: path
        name: id
        required: true
        type: string
      - default: 20
        description: 最大取得件数
        in: query
        name: limit
        type: integer
      - default: 0
        description: スキップ件数
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.ReviewListResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: エピソードのレビュー一覧
      tags:
      - reviews
    post:
      consumes:
      - application/json
      description: 認証ユーザーがエピソードにレビューを投稿します
      parameters:
      - description: エピソードID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: レビュー内容
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/usecase.CreateReviewInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Review'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: レビュー投稿
      tags:
      - reviews
  /episodes/{id}/reviews/mine:
    delete:
      description: 認証ユーザーの自分のレビューを削除します
      parameters:
      - description: エピソードID (UUID)
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: レビュー削除
      tags:
      - reviews
    get:
      description: 認証ユーザーが指定エピソードに投稿したレビューを取得します。未投稿の場合は 404 を返します。
      parameters:
      - description: エピソードID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.MyReviewResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 自分のレビュー取得
      tags:
      - reviews
    put:
      consumes:
      - application/json
      description: 認証ユーザーの自分のレビューを更新します
      parameters:
      - description: エピソードID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: レビュー内容
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/usecase.UpdateReviewInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Review'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: レビュー更新
      tags:
      - reviews
  /genres:
    get:
      description: DB に登録されている番組のジャンル一覧を取得します。英語名・日本語名の両方を含みます。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.GenreListResult'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ジャンル一覧取得
      tags:
      - genres
  /health:
    get:
      description: サーバーとDBの稼働状態を確認します
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ヘルスチェック
      tags:
      - health
  /podcasts/{id}:
    get:
      description: ポッドキャストIDから詳細情報を取得します。平均評価・レビュー件数を含みます。
      parameters:
      - description: ポッドキャストID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.PodcastDetailResult'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ポッドキャスト詳細取得
      tags:
      - podcasts
  /podcasts/{id}/episodes:
    get:
      description: ポッドキャストIDに紐づくエピソード一覧を取得します。各エピソードに平均評価・レビュー件数を含みます。認証済みの場合は聴取状態も含みます。
      parameters:
      - description: ポッドキャストID (UUID)
        in: path
        name: id
        required: true
        type: string
      - default: 20
        description: 最大取得件数
        in: query
        name: limit
        type: integer
      - default: 0
        description: スキップ件数
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.EpisodeListResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: エピソード一覧取得
      tags:
      - podcasts
    post:
      consumes:
      - application/json
      description: ポッドキャストに新しいエピソードを登録します。iTunes Track ID が既に存在する場合は既存エピソードを返します。
      parameters:
      - description: ポッドキャストID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: エピソード情報
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/usecase.CreateEpisodeInput'
      produces:
      - application/json
      responses:
        "200":
          description: 既存エピソード返却（iTunes Track ID 重複）
          schema:
            $ref: '#/definitions/model.Episode'
        "201":
          description: 新規作成
          schema:
            $ref: '#/definitions/model.Episode'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: エピソード作成
      tags:
      - episodes
  /podcasts/{id}/episodes/fetch:
    post:
      description: ポッドキャストのRSSフィードからエピソードを自動取得してDBに登録します。GUIDで重複を検知し、新規のみ追加します。
      parameters:
      - description: ポッドキャストID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 取得結果（新規・スキップ・失敗件数）
          schema:
            $ref: '#/definitions/usecase.FetchFromFeedResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: RSSフィードからエピソード取得
      tags:
      - episodes
  /podcasts/{id}/rating:
    get:
      description: ポッドキャストの全エピソードの平均評価を取得します
      parameters:
      - description: ポッドキャストID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.PodcastRatingResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ポッドキャスト平均評価
      tags:
      - reviews
  /podcasts/fetch-url:
    post:
      consumes:
      - application/json
      description: 外部URLからOGP情報を取得します
      parameters:
      - description: URL
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ogp.OGPData'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: URL情報取得
      tags:
      - podcasts
  /podcasts/popular:
    get:
      description: レビュー件数の多い番組をランキング順で取得します。探す画面の「人気の番組」セクションで使用します。
      parameters:
      - default: 10
        description: 最大取得件数
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.PodcastSearchResult'
      summary: 人気ポッドキャスト一覧
      tags:
      - podcasts
  /podcasts/request:
    post:
      consumes:
      - application/json
      description: 認証ユーザーが番組の追加をリクエストします
      parameters:
      - description: リクエスト内容
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/usecase.CreatePodcastRequestInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/usecase.PodcastRequestResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 番組追加リクエスト
      tags:
      - podcast-requests
  /podcasts/search:
    get:
      description: アプリ内 DB に登録済みの番組をキーワードで検索します。平均評価・レビュー件数を含みます。genre パラメータでジャンル絞り込みが可能です。
      parameters:
      - description: 検索キーワード（genre 指定時は省略可）
        in: query
        name: q
        type: string
      - description: 親カテゴリ名（ジャンル一覧 API の id を指定。サブカテゴリに自動展開される）
        in: query
        name: genre
        type: string
      - default: 20
        description: 最大取得件数
        in: query
        name: limit
        type: integer
      - default: 0
        description: オフセット
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.PodcastSearchResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ポッドキャスト検索
      tags:
      - podcasts
  /sitemap/episodes:
    get:
      description: sitemap 生成用に、全 episode の id / updated_at のみを軽量に返します。ページングなし。FE
        の app/sitemap.ts からのみ呼ばれる内部 API で、Authorization ヘッダーで共有秘密の Bearer トークン（SITEMAP_API_TOKEN）を要求します（development
        環境では認証スキップ）。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.SitemapEpisodesResult'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: sitemap 用 episode 一覧取得
      tags:
      - sitemap
  /sitemap/podcasts:
    get:
      description: sitemap 生成用に、全 podcast の id / updated_at のみを軽量に返します。ページングなし。FE
        の app/sitemap.ts からのみ呼ばれる内部 API で、Authorization ヘッダーで共有秘密の Bearer トークン（SITEMAP_API_TOKEN）を要求します（development
        環境では認証スキップ）。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.SitemapPodcastsResult'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: sitemap 用 podcast 一覧取得
      tags:
      - sitemap
  /sitemap/users:
    get:
      description: sitemap 生成用に、有効な全ユーザーの username / updated_at のみを軽量に返します。ページングなし。ソフトデリート済みユーザーは除外。FE
        の app/sitemap.ts からのみ呼ばれる内部 API で、Authorization ヘッダーで共有秘密の Bearer トークン（SITEMAP_API_TOKEN）を要求します（development
        環境では認証スキップ）。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.SitemapUsersResult'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: sitemap 用 user 一覧取得
      tags:
      - sitemap
  /timeline:
    get:
      description: 全ユーザーの最新レビューを時系列で取得します
      parameters:
      - default: 20
        description: 最大取得件数
        in: query
        name: limit
        type: integer
      - default: 0
        description: スキップ件数
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.TimelineResult'
      summary: タイムライン
      tags:
      - timeline
  /users/{username}:
    get:
      description: ユーザー名から公開プロフィールを取得します
      parameters:
      - description: ユーザー名
        in: path
        name: username
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.UserPublicProfile'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 公開プロフィール取得
      tags:
      - users
  /users/{username}/favorite-podcasts:
    get:
      description: ユーザー名を指定して好きな番組一覧を取得します。ユーザーページの「好きな番組」セクションで使用します。
      parameters:
      - description: ユーザー名
        in: path
        name: username
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.FavoritePodcastListResult'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ユーザーの好きな番組一覧（公開）
      tags:
      - favorite-podcasts
  /users/{username}/listening-records:
    get:
      description: ユーザー名を指定して聴取履歴をエピソード・ポッドキャスト情報付きで取得します
      parameters:
      - description: ユーザー名
        in: path
        name: username
        required: true
        type: string
      - default: 20
        description: 最大取得件数
        in: query
        name: limit
        type: integer
      - default: 0
        description: スキップ件数
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.ListeningRecordListResult'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ユーザーの聴取履歴一覧（公開）
      tags:
      - listening-records
  /users/{username}/reviews:
    get:
      description: ユーザー名を指定してレビュー一覧をエピソード・ポッドキャスト情報付きで取得します
      parameters:
      - description: ユーザー名
        in: path
        name: username
        required: true
        type: string
      - default: 20
        description: 最大取得件数
        in: query
        name: limit
        type: integer
      - default: 0
        description: スキップ件数
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.UserReviewListResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ユーザーのレビュー一覧（公開）
      tags:
      - reviews
  /users/me:
    get:
      description: 認証済みユーザー自身のプロフィールを取得します。is_admin フィールドで管理者かどうかを判定できます。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.MyProfileResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 自分のプロフィール取得
      tags:
      - users
    put:
      consumes:
      - application/json
      description: 認証済みユーザーのプロフィールを更新します
      parameters:
      - description: 更新情報
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.UserPublicProfile'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: プロフィール更新
      tags:
      - users
  /users/me/avatar:
    post:
      consumes:
      - multipart/form-data
      description: 認証済みユーザーのアバター画像をアップロードします。JPEG/PNG、最大2MB。
      parameters:
      - description: アバター画像（JPEG/PNG、最大2MB）
        in: formData
        name: avatar
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.AvatarUploadResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: アバター画像アップロード
      tags:
      - users
  /users/me/favorite-podcasts:
    put:
      consumes:
      - application/json
      description: プロフィール編集画面で好きな番組リストを保存します。既存のリストを全て置き換えます。
      parameters:
      - description: 好きな番組の podcast_id リスト
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/usecase.UpdateFavoritePodcastsInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.FavoritePodcastListResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 好きな番組を一括更新
      tags:
      - favorite-podcasts
  /users/me/listening-records:
    get:
      description: 認証ユーザーの聴取履歴をエピソード・ポッドキャスト情報付きで取得します
      parameters:
      - default: 20
        description: 最大取得件数
        in: query
        name: limit
        type: integer
      - default: 0
        description: スキップ件数
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.ListeningRecordListResult'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 聴取履歴一覧
      tags:
      - listening-records
  /users/me/recent-episodes:
    get:
      description: 認証ユーザーが記録をつけた番組の、まだ聴いていないエピソードを番組ごとにグループ化して取得します。各番組の未聴取エピソードは最新3件まで返します。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.RecentEpisodeListResult'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 最近のエピソード取得（番組グループ化）
      tags:
      - episodes
  /users/me/reviews:
    get:
      description: 認証ユーザーのレビュー一覧をエピソード・ポッドキャスト情報付きで取得します
      parameters:
      - default: 20
        description: 最大取得件数
        in: query
        name: limit
        type: integer
      - default: 0
        description: スキップ件数
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.UserReviewListResult'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 自分のレビュー一覧
      tags:
      - reviews
  /users/profile:
    post:
      consumes:
      - application/json
      description: Supabase Auth で認証後、初回プロフィールを作成します
      parameters:
      - description: プロフィール情報
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CreateProfileRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.UserPublicProfile'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: プロフィール作成
      tags:
      - users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
