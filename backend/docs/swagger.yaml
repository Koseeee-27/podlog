basePath: /api/v1
definitions:
  model.CreateProfileRequest:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      display_name:
        type: string
      username:
        type: string
    required:
    - display_name
    - username
    type: object
  model.Episode:
    properties:
      artwork_url:
        type: string
      audio_url:
        type: string
      created_at:
        type: string
      description:
        type: string
      duration_ms:
        type: integer
      id:
        type: string
      itunes_track_id:
        type: integer
      podcast_id:
        type: string
      published_at:
        type: string
      source_url:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  model.Podcast:
    properties:
      artwork_url:
        type: string
      author:
        type: string
      created_at:
        type: string
      description:
        type: string
      feed_url:
        type: string
      genre:
        type: string
      id:
        type: string
      itunes_id:
        type: integer
      itunes_url:
        type: string
      source_type:
        type: string
      source_url:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  model.UpdateProfileRequest:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      display_name:
        type: string
    type: object
  model.User:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      id:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  model.UserPublicProfile:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      id:
        type: string
      username:
        type: string
    type: object
  ogp.OGPData:
    properties:
      description:
        type: string
      image:
        type: string
      site_name:
        type: string
      title:
        type: string
      url:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: お笑いラジオの視聴記録SNS API
  title: Podlog API
  version: "1.0"
paths:
  /episodes/{id}:
    get:
      description: エピソードIDから詳細情報を取得します
      parameters:
      - description: エピソードID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Episode'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: エピソード詳細取得
      tags:
      - episodes
  /health:
    get:
      description: サーバーの稼働状態を確認します
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ヘルスチェック
      tags:
      - health
  /podcasts/{id}:
    get:
      description: ポッドキャストIDから詳細情報を取得します
      parameters:
      - description: ポッドキャストID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Podcast'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ポッドキャスト詳細取得
      tags:
      - podcasts
  /podcasts/{id}/episodes:
    get:
      description: ポッドキャストIDに紐づくエピソード一覧を取得します
      parameters:
      - description: ポッドキャストID (UUID)
        in: path
        name: id
        required: true
        type: string
      - default: 20
        description: 最大取得件数
        in: query
        name: limit
        type: integer
      - default: 0
        description: スキップ件数
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Episode'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: エピソード一覧取得
      tags:
      - podcasts
  /podcasts/fetch-url:
    post:
      consumes:
      - application/json
      description: 外部URLからOGP情報を取得します
      parameters:
      - description: URL
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ogp.OGPData'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: URL情報取得
      tags:
      - podcasts
  /podcasts/search:
    get:
      description: iTunes API を使ってポッドキャストを検索します
      parameters:
      - description: 検索キーワード
        in: query
        name: q
        required: true
        type: string
      - default: 20
        description: 最大取得件数
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Podcast'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: ポッドキャスト検索
      tags:
      - podcasts
  /users/{username}:
    get:
      description: ユーザー名から公開プロフィールを取得します
      parameters:
      - description: ユーザー名
        in: path
        name: username
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.UserPublicProfile'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 公開プロフィール取得
      tags:
      - users
  /users/me:
    get:
      description: 認証済みユーザー自身のプロフィールを取得します
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.User'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 自分のプロフィール取得
      tags:
      - users
    put:
      consumes:
      - application/json
      description: 認証済みユーザーのプロフィールを更新します
      parameters:
      - description: 更新情報
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.UserPublicProfile'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: プロフィール更新
      tags:
      - users
  /users/profile:
    post:
      consumes:
      - application/json
      description: Supabase Auth で認証後、初回プロフィールを作成します
      parameters:
      - description: プロフィール情報
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CreateProfileRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.UserPublicProfile'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: プロフィール作成
      tags:
      - users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
